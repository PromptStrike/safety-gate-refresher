name: ai-safety-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  safety-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Start SUT
        env:
          OLLAMA_URL: ${{ secrets.GROQ_URL }}
          MODEL_NAME: "llama3-8b-8192"
          LLM_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Health check
        run: curl --fail http://localhost:8000/healthz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Promptfoo
        run: npm install -g promptfoo@0.121.4

      - name: Run safety gate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd tests
          promptfoo eval -c promptfooconfig.yaml --max-concurrency 2

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-gate-report
          path: tests/.promptfoo/

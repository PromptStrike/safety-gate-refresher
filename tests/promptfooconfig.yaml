description: "Session 1 safety gate — 18 adversarial cases"

providers:
  - id: http
    config:
      url: "http://localhost:8000/chat"
      method: POST
      headers:
        Content-Type: application/json
      body:
        message: "{{prompt}}"
      transformResponse: "json.reply"

prompts:
  - "{{prompt}}"

tests: file://tests.yaml

sharing: false
